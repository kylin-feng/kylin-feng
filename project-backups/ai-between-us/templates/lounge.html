<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感客厅 - Between Us</title>

    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        /* 情侣标识独立栏 */
        .couple-bar {
            background: linear-gradient(135deg, rgba(230, 168, 164, 0.12), rgba(199, 178, 255, 0.16));
            border-bottom: 1px solid var(--home-border);
            padding: 12px 20px;
        }

        .couple-bar .couple-row {
            margin-top: 0 !important;
            padding-top: 0;
            border-top: none;
        }

        /* 输入区域包装器 */
        .chat-input-wrapper {
            background: rgba(255, 255, 255, 0.85);
            border-top: 1px solid var(--home-border);
            padding: 10px 16px 12px;
        }

        .chat-input-wrapper .chat-input {
            border-top: none;
            padding: 8px 0 0;
            background: transparent;
        }

        /* 教练标签按钮 */
        .coach-tag-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1.5px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, #e6a8a4, #c7b2ff) border-box;
            color: var(--home-ink, #4a3b39);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(230, 168, 164, 0.2);
        }

        .coach-tag-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(230, 168, 164, 0.35);
            background: linear-gradient(rgba(255,255,255,0.95), rgba(255,255,255,0.95)) padding-box,
                        linear-gradient(135deg, #e6a8a4, #c7b2ff) border-box;
        }

        .coach-tag-btn:active {
            transform: scale(0.97);
        }

        .coach-tag-icon {
            font-size: 14px;
        }

        /* 覆盖消息容器的内边距 */
        .chat-messages {
            padding: 16px 8px;
        }

        /* 下拉刷新样式 */
        .pull-refresh {
            height: 0;
            overflow: hidden;
            transition: height 0.15s cubic-bezier(0.4, 0, 0.2, 1); /* 更快更流畅的过渡 */
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(0); /* 确保指示器在顶部 */
        }

        .pull-refresh.active {
            height: 40px;
        }

        .refresh-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #999;
            font-size: 11px;
        }

        .refresh-arrow {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); /* 更快的箭头旋转 */
            font-size: 14px;
        }

        .pull-refresh.ready .refresh-arrow {
            transform: rotate(180deg);
        }

        .pull-refresh.refreshing .refresh-arrow {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 微信经典聊天布局 */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 14px;
            padding: 0 0px;
            width: 100%;
        }

        .message.user {
            flex-direction: row-reverse;
            justify-content: flex-start;
        }

        .message.partner,
        .message.assistant {
            justify-content: flex-start;
        }

        /* 头像样式 */
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        /* 自己的头像 - 粉紫渐变 */
        .message.user .message-avatar {
            background: linear-gradient(135deg, #e6a8a4, #d4a5c9);
        }

        /* 伴侣头像 - 紫色渐变 */
        .message.partner .message-avatar {
            background: linear-gradient(135deg, #c7b2ff, #a89ad9);
        }

        /* 教练头像 - 温暖橙色 */
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #f0c27b, #d4a574);
        }

        /* 内容区域 */
        .message-body {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.user .message-body {
            align-items: flex-end;
        }

        .message.partner .message-body,
        .message.assistant .message-body {
            align-items: flex-start;
        }

        /* 昵称样式 */
        .message-sender {
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .message.user .message-sender {
            display: none;
        }

        .sender-name {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .sender-name.partner {
            color: #8b7aa8;
        }

        .sender-name.coach {
            color: #9d7a5a;
        }

        .sender-name .coach-icon {
            font-size: 11px;
            margin-right: 2px;
        }

        /* 消息气泡 - 覆盖 common.css 的样式 */
        .message .message-content {
            max-width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }

        /* 自己的消息气泡 */
        .message.user .message-content {
            background: linear-gradient(135deg, var(--home-accent), var(--home-accent-2));
            color: #fff;
            border-radius: 8px 2px 8px 8px;
        }

        /* 伴侣的消息气泡 */
        .message.partner .message-content {
            background: rgba(255, 255, 255, 0.95);
            color: var(--home-ink);
            border: 1px solid var(--home-border);
            border-radius: 2px 8px 8px 8px;
        }

        /* 教练的消息气泡 */
        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.95);
            color: var(--home-ink);
            border: 1px solid rgba(240, 194, 123, 0.3);
            border-radius: 2px 8px 8px 8px;
        }

        /* 返回按钮优化 */
        .chat-header .back-btn {
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid var(--home-border);
            color: var(--home-ink);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(74, 59, 57, 0.08);
            transition: all 0.2s ease;
        }

        .chat-header .back-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateX(-2px);
            box-shadow: 0 6px 16px rgba(74, 59, 57, 0.12);
        }

        .chat-header .back-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="lounge-page">
    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <button class="back-btn" onclick="window.location.href='/home'" aria-label="返回">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M15 18l-6-6 6-6"/>
                                    </svg>
                                </button>
                <h2>💑 情感客厅</h2>
                <div></div>
            </div>

            <div class="couple-bar">
                <div class="couple-row" aria-label="情侣标识">
                    <div class="couple-pill">
                        <span class="couple-avatar">我</span>
                        <span class="couple-name" id="myNickname">--</span>
                    </div>
                    <span class="couple-heart" aria-hidden="true">💗</span>
                    <div class="couple-pill">
                        <span class="couple-avatar">Ta</span>
                        <span class="couple-name" id="partnerNickname">--</span>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- 下拉刷新指示器 -->
                <div class="pull-refresh" id="pullRefresh">
                    <div class="refresh-indicator">
                        <span class="refresh-arrow">⬇️</span>
                        <span class="refresh-text">下拉刷新</span>
                    </div>
                </div>
                <!-- 消息列表 -->
            </div>

            <div class="chat-input-wrapper">
                <button class="coach-tag-btn" onclick="insertCoachTag()">
                    <span class="coach-tag-icon">🎯</span>
                    <span>教练你怎么看？</span>
                </button>
                <div class="chat-input">
                <input type="text" id="messageInput" placeholder="一起聊聊你的想法..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div class="gentle-shape gentle-shape-1" aria-hidden="true"></div>
    <div class="gentle-shape gentle-shape-2" aria-hidden="true"></div>
    <div class="gentle-shape gentle-shape-3" aria-hidden="true"></div>

    <script>
        let roomId = null;
        let userId = null;
        let userPhone = '';
        let partnerPhone = '';
        let messages = [];
        // 用户昵称信息（用手机号后4位作为默认显示）
        let userNickname = '我';
        let partnerNickname = 'Ta';
        // 用于轮询的时间戳
        let lastMessageTime = null;
        // 轮询间隔（毫秒）
        const pollingInterval = 2000;
        // 轮询定时器
        let pollingTimer = null;
        
        // 下拉刷新相关变量
        let isRefreshing = false;
        let isPulling = false;
        let startY = 0;
        const REFRESH_THRESHOLD = 10; // 触发刷新的阈值，设置为极小值以实现超灵敏的刷新效果
        const CHAT_MESSAGES = document.getElementById('chatMessages');
        const PULL_REFRESH = document.getElementById('pullRefresh');
        const REFRESH_TEXT = document.querySelector('.refresh-text');
        const REFRESH_ARROW = document.querySelector('.refresh-arrow');

        // Toast 提示函数
        function showToast(message, type = 'info', duration = 2500) {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        async function init() {
            // 获取用户信息
            const userResponse = await fetch('/api/user/info');

            // 检查是否需要重新登录
            if (userResponse.status === 401) {
                showToast('登录已过期，请重新登录', 'error');
                window.location.href = '/';
                return;
            }

            const userData = await userResponse.json();

            if (!userData.success || !userData.user.has_partner) {
                showToast('您还没有绑定伴侣，无法进入情感客厅', 'info');
                window.location.href = '/home';
                return;
            }

            userId = userData.user.id;
            userPhone = userData.user.phone || '';
            
            // 用手机号后4位作为昵称
            userNickname = userPhone ? userPhone.slice(-4) : '我';
            
            // 获取伴侣信息
            if (userData.user.partner_id) {
                try {
                    const partnerRes = await fetch(`/api/user/${userData.user.partner_id}`);
                    if (partnerRes.ok) {
                        const partnerData = await partnerRes.json();
                        if (partnerData.success && partnerData.user) {
                            partnerPhone = partnerData.user.phone || '';
                            partnerNickname = partnerPhone ? partnerPhone.slice(-4) : 'Ta';
                        }
                    }
                } catch (e) {
                    console.error('获取伴侣信息失败', e);
                }
            }
            
            // 更新顶部情侣栏显示
            updateCoupleBar(userNickname, partnerNickname);

            // 获取房间信息
            const roomResponse = await fetch('/api/lounge/room');

            if (roomResponse.status === 401) {
                showToast('登录已过期，请重新登录', 'error');
                window.location.href = '/';
                return;
            }

            const roomData = await roomResponse.json();

            if (!roomData.success) {
                showToast('无法获取房间信息', 'error');
                window.location.href = '/home';
                return;
            }

            roomId = roomData.room_id;

            // 加载历史记录
            await loadHistory();

            // 开始轮询新消息
            startPolling();
        }

        async function loadHistory() {
            try {
                const response = await fetch(`/api/lounge/messages?room_id=${roomId}`);
                const data = await response.json();

                if (data.success) {
                    messages = data.messages;
                    renderMessages();
                    
                    // 更新最后一条消息的时间
                    if (messages.length > 0) {
                        lastMessageTime = messages[messages.length - 1].created_at;
                    }
                }
            } catch (error) {
                console.error('加载历史记录失败', error);
            }
        }

        async function fetchNewMessages() {
            try {
                let url = `/api/lounge/messages?room_id=${roomId}`;
                if (lastMessageTime) {
                    url += `&since=${lastMessageTime}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();

                if (data.success && data.messages.length > 0) {
                    // 添加新消息
                    messages.push(...data.messages);
                    renderMessages();
                    
                    // 更新最后一条消息的时间
                    lastMessageTime = data.messages[data.messages.length - 1].created_at;
                    
                    // 检查是否需要触发 AI
                    const lastMessage = data.messages[data.messages.length - 1];
                    if (lastMessage.trigger_ai && lastMessage.user_id === userId) {
                        await callAI();
                    }
                }
            } catch (error) {
                console.error('获取新消息失败', error);
            }
        }

        function startPolling() {
            // 立即获取一次
            fetchNewMessages();
            
            // 设置定时器
            pollingTimer = setInterval(fetchNewMessages, pollingInterval);
        }

        function stopPolling() {
            if (pollingTimer) {
                clearInterval(pollingTimer);
                pollingTimer = null;
            }
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            messages.forEach((msg, index) => {
                const messageDiv = document.createElement('div');
                let senderName = '';
                let senderType = '';
                let avatarText = '';

                if (msg.role === 'assistant') {
                    messageDiv.className = 'message assistant';
                    senderName = '情感教练';
                    senderType = 'coach';
                    avatarText = '✨';
                } else if (msg.user_id === userId) {
                    messageDiv.className = 'message user';
                    senderName = userNickname;
                    senderType = 'self';
                    avatarText = '我';
                } else {
                    messageDiv.className = 'message partner';
                    senderName = partnerNickname;
                    senderType = 'partner';
                    avatarText = 'Ta';
                }

                // 创建头像
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'message-avatar';
                avatarDiv.textContent = avatarText;

                // 创建内容区域
                const bodyDiv = document.createElement('div');
                bodyDiv.className = 'message-body';

                // 创建昵称标签（只有伴侣和教练的消息显示）
                const senderDiv = document.createElement('div');
                senderDiv.className = 'message-sender';
                
                const senderSpan = document.createElement('span');
                senderSpan.className = `sender-name ${senderType}`;
                
                if (senderType === 'coach') {
                    senderSpan.innerHTML = `<span class="coach-icon">✨</span>${senderName}`;
                } else {
                    senderSpan.textContent = senderName;
                }
                senderDiv.appendChild(senderSpan);

                // 创建消息气泡
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = msg.content;

                // 组装内容区域
                bodyDiv.appendChild(senderDiv);
                bodyDiv.appendChild(contentDiv);

                // 组装消息
                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(bodyDiv);
                container.appendChild(messageDiv);
            });

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 更新顶部情侣栏
        function updateCoupleBar(myName, partnerName) {
            const myNicknameEl = document.getElementById('myNickname');
            const partnerNicknameEl = document.getElementById('partnerNickname');
            if (myNicknameEl) myNicknameEl.textContent = myName;
            if (partnerNicknameEl) partnerNicknameEl.textContent = partnerName;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            try {
                // 发送用户消息
                const response = await fetch('/api/lounge/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        room_id: roomId,
                        content: content
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 清空输入框
                    input.value = '';
                    
                    // 立即获取新消息
                    await fetchNewMessages();
                    
                    // 如果消息包含@教练，调用AI代理
                    if (content.includes('@教练')) {
                        await callAI();
                    }
                } else {
                    showToast('发送消息失败: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('发送消息失败', error);
                showToast('发送消息失败，请稍后重试', 'error');
            }
        }

        async function callAI() {
            try {
                // 创建临时消息显示
                const tempMsg = {
                    id: 'temp_ai_' + Date.now(),
                    role: 'assistant',
                    content: '🎯 情感教练正在分析...',
                    created_at: new Date().toISOString()
                };
                messages.push(tempMsg);
                renderMessages();
                
                // 调用 AI API
                const response = await fetch('/api/lounge/call_ai', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        room_id: roomId
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 移除临时消息
                    messages = messages.filter(msg => msg.id !== tempMsg.id);
                    
                    // 立即获取新消息
                    await fetchNewMessages();
                } else {
                    // 移除临时消息
                    messages = messages.filter(msg => msg.id !== tempMsg.id);
                    showToast('调用 AI 失败: ' + result.message, 'error');
                    renderMessages();
                }
            } catch (error) {
                console.error('调用 AI 失败', error);
                showToast('调用 AI 失败，请稍后重试', 'error');
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function insertCoachTag() {
            const input = document.getElementById('messageInput');
            input.value = '@教练 ';
            input.focus();
        }

        // 页面离开时停止轮询
        window.addEventListener('beforeunload', stopPolling);

        // 下拉刷新事件处理
        function handleTouchStart(e) {
            if (isRefreshing) return;
            
            // 只有当滚动位置在顶部时才允许下拉刷新
            if (CHAT_MESSAGES.scrollTop <= 0) {
                startY = e.touches[0].clientY;
                isPulling = true;
            }
        }

        function handleTouchMove(e) {
            if (isRefreshing || !isPulling) return;
            
            const currentY = e.touches[0].clientY;
            const diff = currentY - startY;
            
            // 只处理向下拉动的手势
            if (diff > 0 && CHAT_MESSAGES.scrollTop <= 0) {
                const pullDistance = Math.min(diff, REFRESH_THRESHOLD + 5); // 限制最大拉动距离，更小的值让体验更灵敏
                const progress = pullDistance / REFRESH_THRESHOLD;
                
                // 更新刷新指示器的显示
                if (pullDistance > 0) {
                    // 更新刷新指示器的高度
                    PULL_REFRESH.style.height = `${pullDistance}px`;
                    
                    if (pullDistance >= REFRESH_THRESHOLD) {
                        PULL_REFRESH.classList.add('ready');
                        REFRESH_TEXT.textContent = '松开刷新';
                    } else {
                        PULL_REFRESH.classList.remove('ready');
                        REFRESH_TEXT.textContent = '下拉刷新';
                    }
                }
                
                // 阻止页面滚动
                e.preventDefault();
            } else if (diff <= 0) {
                isPulling = false;
            }
        }

        function handleTouchEnd() {
            if (isRefreshing || !isPulling) return;
            
            isPulling = false;
            const currentHeight = parseFloat(PULL_REFRESH.style.height) || 0;
            
            // 判断是否触发刷新
            if (currentHeight >= REFRESH_THRESHOLD) {
                startRefresh();
            } else {
                // 隐藏刷新指示器
                PULL_REFRESH.style.height = '0';
                PULL_REFRESH.classList.remove('ready');
            }
        }

        async function startRefresh() {
            if (isRefreshing) return;
            
            isRefreshing = true;
            
            // 更新刷新指示器状态
            PULL_REFRESH.classList.add('refreshing');
            PULL_REFRESH.classList.remove('ready');
            REFRESH_TEXT.textContent = '正在刷新...';
            if (REFRESH_ARROW) {
                REFRESH_ARROW.style.display = 'none';
            }
            
            try {
                // 重新加载历史记录
                await loadHistory();
                
                // 刷新成功提示
                showToast('刷新成功', 'success');
            } catch (error) {
                console.error('刷新失败', error);
                showToast('刷新失败，请稍后重试', 'error');
            } finally {
                // 结束刷新状态
                setTimeout(() => {
                    isRefreshing = false;
                    PULL_REFRESH.classList.remove('refreshing');
                    PULL_REFRESH.style.height = '0';
                    REFRESH_TEXT.textContent = '下拉刷新';
                    if (REFRESH_ARROW) {
                        REFRESH_ARROW.style.display = 'inline-block';
                        REFRESH_ARROW.classList.remove('flipped');
                    }
                }, 1000);
            }
        }

        // 绑定下拉刷新事件
        function bindPullRefreshEvents() {
            // 确保刷新指示器初始状态正确
            PULL_REFRESH.style.height = '0';
            
            CHAT_MESSAGES.addEventListener('touchstart', handleTouchStart, { passive: true });
            CHAT_MESSAGES.addEventListener('touchmove', handleTouchMove, { passive: false });
            CHAT_MESSAGES.addEventListener('touchend', handleTouchEnd, { passive: true });
        }

        // 初始化
        init();
        bindPullRefreshEvents();
    </script>
</body>
</html>
