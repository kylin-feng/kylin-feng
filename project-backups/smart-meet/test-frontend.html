<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMeet AI - Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass-effect {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
  <div class="container mx-auto p-6 space-y-6">
    <!-- 头部区域 -->
    <div class="text-center space-y-4">
      <div class="flex items-center justify-center gap-3">
        <div class="w-12 h-12 bg-purple-400 rounded-full flex items-center justify-center">
          🧠
        </div>
        <h1 class="text-5xl font-bold text-white bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
          SmartMeet AI
        </h1>
      </div>
      <p class="text-xl text-gray-300 max-w-2xl mx-auto">
        多智能体协作的智能会议管理助手，让每一次会议都产生价值
      </p>
    </div>

    <!-- 状态指示器 -->
    <div class="text-center">
      <div class="inline-flex items-center space-x-4 glass-effect rounded-lg p-4">
        <div class="flex items-center space-x-2">
          <div id="frontend-status" class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
          <span class="text-white">前端服务</span>
        </div>
        <div class="flex items-center space-x-2">
          <div id="backend-status" class="w-3 h-3 bg-gray-400 rounded-full"></div>
          <span class="text-white">后端API</span>
        </div>
        <div class="flex items-center space-x-2">
          <div id="websocket-status" class="w-3 h-3 bg-gray-400 rounded-full"></div>
          <span class="text-white">WebSocket</span>
        </div>
      </div>
    </div>

    <!-- 控制面板 -->
    <div class="glass-effect rounded-lg p-6">
      <h2 class="text-2xl font-bold text-white mb-4">系统检测</h2>
      <div id="status-log" class="space-y-2 text-sm text-gray-300 max-h-64 overflow-y-auto">
        <div>🔍 正在检测系统状态...</div>
      </div>
    </div>

    <!-- 启动按钮 */
    <div class="text-center">
      <button onclick="window.location.href='http://localhost:3000'" 
              class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg font-semibold transition-colors">
        🚀 访问完整应用
      </button>
    </div>
  </div>

  <script>
    const log = document.getElementById('status-log');
    const addLog = (message, type = 'info') => {
      const div = document.createElement('div');
      div.className = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-gray-300';
      div.textContent = `${new Date().toLocaleTimeString()} - ${message}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    };

    // 检测后端API
    const checkBackend = async () => {
      try {
        const response = await fetch('http://localhost:5001/api/health');
        if (response.ok) {
          document.getElementById('backend-status').className = 'w-3 h-3 bg-green-400 rounded-full animate-pulse';
          addLog('✅ 后端API连接成功', 'success');
          return true;
        } else {
          throw new Error('API响应异常');
        }
      } catch (error) {
        document.getElementById('backend-status').className = 'w-3 h-3 bg-red-400 rounded-full';
        addLog('❌ 后端API连接失败: ' + error.message, 'error');
        return false;
      }
    };

    // 检测WebSocket
    const checkWebSocket = () => {
      try {
        const ws = new WebSocket('ws://localhost:5001');
        ws.onopen = () => {
          document.getElementById('websocket-status').className = 'w-3 h-3 bg-green-400 rounded-full animate-pulse';
          addLog('✅ WebSocket连接成功', 'success');
          ws.close();
        };
        ws.onerror = () => {
          document.getElementById('websocket-status').className = 'w-3 h-3 bg-red-400 rounded-full';
          addLog('❌ WebSocket连接失败', 'error');
        };
      } catch (error) {
        document.getElementById('websocket-status').className = 'w-3 h-3 bg-red-400 rounded-full';
        addLog('❌ WebSocket连接失败: ' + error.message, 'error');
      }
    };

    // 开始检测
    addLog('🔍 开始系统检测...');
    
    setTimeout(async () => {
      const backendOk = await checkBackend();
      if (backendOk) {
        checkWebSocket();
        addLog('🎉 系统检测完成！可以开始使用SmartMeet AI', 'success');
      } else {
        addLog('⚠️ 请确保后端服务已启动 (npm run dev:backend)', 'error');
      }
    }, 1000);
  </script>
</body>
</html>
