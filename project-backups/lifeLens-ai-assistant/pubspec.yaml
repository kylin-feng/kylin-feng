name: life_lens
description: LifeLens AI生活助手 - 基于Rokid AR眼镜的智能生活决策支持应用
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI框架
  cupertino_icons: ^1.0.2
  
  # 状态管理
  provider: ^6.0.5
  
  # 网络请求
  http: ^1.1.0
  dio: ^5.3.2
  
  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # 图像处理
  camera: ^0.10.5
  image_picker: ^1.0.4
  image: ^4.1.3
  
  # 位置服务
  geolocator: ^10.1.0
  location: ^5.0.3
  
  # 语音相关
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.3
  
  # AR相关 (Rokid SDK集成)
  # rokid_ar_sdk: ^1.0.0  # 需要Rokid官方SDK
  
  # 工具库
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  url_launcher: ^6.2.1
  
  # JSON序列化
  json_annotation: ^4.8.1
  
  # 日志
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: PingFang
      fonts:
        - asset: fonts/PingFang-Regular.ttf
        - asset: fonts/PingFang-Bold.ttf
          weight: 700